name: Sync upstream version

on:
  schedule:
    - cron: "0 5 * * *"
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check upstream image, bump version on change
        run: |
          DIGEST="$(docker run --rm gcr.io/go-containerregistry/crane:latest digest ghcr.io/warreth/gphotos2immich:latest)"
          OLD="$(cat .upstream-digest 2>/dev/null || echo none)"
          echo "current=$OLD new=$DIGEST"
          if [ "$DIGEST" = "$OLD" ]; then echo "No change."; exit 0; fi
          echo "$DIGEST" > .upstream-digest
          VER="$(date -u +%Y.%m.%d.%H%M)"
          sed -i -E "s/^version:.*/version: \"$VER\"/" gphotos2immich/config.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: upstream image updated -> $VER"
          git push
